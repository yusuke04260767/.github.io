<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SNAP! MAP</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Dela+Gothic+One&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --yellow: #FFE600;
  --pink:   #FF3CAC;
  --cyan:   #00F0FF;
  --lightblue:   #2d96d7d4;
  --black:  #111;
  --white:  #FAFAFA;
  --green:  #A8D878;
  --lightgreen:  #2fae7c;
  --green-dark: #6BAF3C;
  --border: 3px solid var(--black);
  --sh:     5px 5px 0 var(--black);
  --sh-lg:  8px 8px 0 var(--black);
  --map-base:  #D4EDBA;
  --map-hover: #0084ffdc;
  --map-shot:  #A8D878;
  --map-active:#ff0090;
  --sakura: #e4389a;
}

html { scroll-behavior: smooth; }
body {
  background: var(--white);
  color: var(--black);
  font-family: 'M PLUS Rounded 1c', sans-serif;
  overflow-x: hidden;
}
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background: var(--lightgreen); }
::-webkit-scrollbar-thumb { background: var(--black); }

/* halftone */
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image: radial-gradient(circle, rgba(0,0,0,0.08) 1px, transparent 1px);
  background-size: 20px 20px;
}

/* ─── HEADER ─── */
header {
  position: sticky; top:0; z-index:200;
  background: var(--lightblue);
  border-bottom: var(--border);
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 clamp(1rem,4vw,2rem);
}
.logo {
  font-family: 'Bangers', cursive;
  font-size: clamp(1.5rem,4vw,2rem);
  letter-spacing: 0.1em;
  color: var(--black);
  text-decoration: none;
  display: flex; align-items: center; gap: 6px;
}
.logo-pip {
  width: 10px; height: 10px;
  background: var(--pink);
  border-radius: 50%;
  border: 2px solid var(--black);
  margin-bottom: 3px;
  flex-shrink: 0;
}
.tab-nav {
  display: flex; gap: 0;
}
.tab-btn {
  font-family: 'Dela Gothic One', cursive;
  font-size: clamp(0.6rem,1.8vw,0.75rem);
  letter-spacing: 0.1em;
  padding: 6px 14px;
  border: 2px solid var(--black);
  background: transparent;
  cursor: pointer;
  transition: background 0.15s;
  margin-left: -2px;
}
.tab-btn.active { background: var(--lightblue); color: var(--black); }
.tab-btn:not(.active):hover { background: rgba(0,0,0,0.06); }

/* ─── SECTIONS ─── */
.section { display: none; }
.section.active { display: block; }

/* ─── JAPAN LAYOUT ─── */
.japan-wrap {
  display: grid;
  grid-template-columns: 1fr;
  position: relative;
}
@media(min-width:900px){
  .japan-wrap { grid-template-columns: 1fr 340px; }
}

/* MAP */
.map-col {
  background: #EDF7E0;
  border-bottom: var(--border);
  padding: clamp(1rem,2vw,1.5rem);
  position: relative;
}
@media(min-width:900px){
  .map-col { border-right: var(--border); border-bottom: none; }
}

.map-hint {
  display: flex; align-items: center; gap: 8px;
  background: var(--lightblue);
  border: var(--border);
  box-shadow: var(--sh);
  padding: 7px 12px;
  margin-bottom: 10px;
  font-family: 'Dela Gothic One', cursive;
  font-size: clamp(0.6rem,1.6vw,0.72rem);
  letter-spacing: 0.06em;
}
.legend {
  display: flex; flex-wrap: wrap; gap: 10px;
  margin-bottom: 10px;
}
.leg { display:flex; align-items:center; gap:5px; font-size:0.62rem; font-weight:700; letter-spacing:0.08em; }
.leg-sw { width:14px; height:14px; border:2px solid var(--black); flex-shrink:0; }

#japan-svg {
  width: 100%; height: auto; display: block;
  filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.1));
}
.pref-path {
  fill: var(--map-base);
  stroke: var(--black); stroke-width:1.2; stroke-linejoin:round;
  cursor: pointer;
  transition: fill 0.12s ease;
}
.pref-path:hover { fill: var(--lightgreen); }
.pref-path.has-photo { fill: var(--map-shot); }
.pref-path.active { fill: var(--map-active) !important; stroke-width:2.5; }

/* tooltip */
#tip {
  position: fixed;
  background: var(--lightgreen); color: var(--black);
  font-family: 'Dela Gothic One', cursive;
  font-size: 0.72rem; letter-spacing:0.08em;
  padding: 4px 10px;
  border: 2px solid var(--black);
  box-shadow: 3px 3px 0 var(--black);
  pointer-events: none; z-index:9999;
  display: none; white-space: nowrap;
}

/* SIDE PANEL */
.info-col {
  padding: clamp(1rem,2vw,1.5rem);
  display: flex; flex-direction: column; gap: 1rem;
}
@media(min-width:900px){
  .info-col {
    position: sticky; top: 56px;
    max-height: calc(100svh - 56px);
    overflow-y: auto;
  }
}

/* default state */
.panel-idle {
  background: var(--lightblue);
  border: var(--border); box-shadow: var(--sh);
  padding: 1.8rem 1.5rem; text-align: center;
}
.panel-idle-icon { font-size: 2.8rem; display:block; margin-bottom:.5rem;
  animation: rock 2.5s ease infinite; }
@keyframes rock { 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(6deg)} }
.panel-idle p { font-family:'Dela Gothic One',cursive; font-size:clamp(.85rem,2.2vw,1rem); letter-spacing:.05em; line-height:1.65; }

/* photo card */
.photo-card {
  border: var(--border); box-shadow: var(--sh-lg);
  overflow: hidden; background: var(--white);
  display: none;
  animation: popIn .35s cubic-bezier(.34,1.56,.64,1) forwards;
}
.photo-card.show { display: block; }
@keyframes popIn {
  from { transform: scale(.84) rotate(-2.5deg); opacity:0; }
  to   { transform: scale(1) rotate(-.4deg); opacity:1; }
}

.card-img-area {
  width:100%; aspect-ratio:16/10;
  display:flex; align-items:center; justify-content:center;
  border-bottom: var(--border);
  font-family:'Dela Gothic One',cursive;
  font-size:clamp(.65rem,1.8vw,.8rem);
  letter-spacing:.1em; color:rgba(255,255,255,.3);
  position: relative; overflow:hidden;
}
.card-img-area img {
  position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
}

.no-photo-placeholder {
  width:100%; aspect-ratio:16/10;
  background: repeating-linear-gradient(45deg,#e0e0e0 0,#e0e0e0 8px,#eee 8px,#eee 16px);
  border-bottom: var(--border);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.5rem;
}
.no-photo-placeholder .cam { font-size:2.2rem; opacity:.35; }
.no-photo-placeholder span { font-family:'Dela Gothic One',cursive; font-size:.72rem; letter-spacing:.1em; color:rgba(0,0,0,.3); }
.card-body { padding: 1rem; }
.card-location {
  display:inline-flex; align-items:center; gap:5px;
  background: var(--white); border:2px solid var(--white); box-shadow:2px 2px 0 var(--white);
  padding:2px 10px; margin-bottom:.7rem;
  font-family:'Dela Gothic One',cursive; font-size:.62rem; letter-spacing:.1em;
}
.card-title { font-family:'Dela Gothic One',cursive; font-size:clamp(1rem,2.8vw,1.3rem); letter-spacing:.03em; margin-bottom:.5rem; line-height:1.3; }
.card-desc { font-size:.78rem; line-height:1.9; color:#444; border-left:4px solid var(--lightgreen); padding-left:.7rem; margin-bottom:.8rem; }
.card-chips { display:flex; flex-wrap:wrap; gap:.35rem; }
.chip { background:var(--black); color:var(--lightgreen); font-family:'Dela Gothic One',cursive; font-size:.58rem; letter-spacing:.1em; padding:3px 8px; }

/* prefecture list */
.pref-list-box { border:var(--border); box-shadow:var(--sh); overflow:hidden; }
.pref-list-hd { background:var(--black); color:var(--lightgreen); font-family:'Dela Gothic One',cursive; font-size:.68rem; letter-spacing:.15em; padding:9px 13px; }
.pref-list { max-height:260px; overflow-y:auto; scrollbar-width:thin; }
.pref-row {
  display:flex; align-items:center; gap:8px;
  padding:8px 13px; border-bottom:2px solid #eee;
  cursor:pointer; background:var(--white);
  font-family:'Dela Gothic One',cursive; font-size:.72rem; letter-spacing:.04em;
  transition:background .12s;
}
.pref-row:last-child { border-bottom:none; }
.pref-row:hover,.pref-row.active { background:var(--lightgreen); }
.pref-dot { width:9px; height:9px; border-radius:50%; border:2px solid var(--black); flex-shrink:0; }
.pref-dot.shot { background:var(--map-shot); }
.pref-dot.none { background:var(--map-base); }
.pref-region { margin-left:auto; font-size:.55rem; color:#999; letter-spacing:.08em; flex-shrink:0; }

/* ─── OVERSEAS SECTION ─── */
.overseas-wrap {
  padding: clamp(1.5rem,4vw,3rem) clamp(1rem,4vw,2.5rem);
}

.overseas-header {
  display: flex; align-items: center; gap: 1rem;
  margin-bottom: 1.8rem;
}
.overseas-title {
  font-family: 'Dela Gothic One', cursive;
  font-size: clamp(2rem,6vw,4rem);
  letter-spacing: .06em; line-height:1;
}
.overseas-count-tag {
  background: var(--pink); color: var(--white);
  font-family: 'Dela Gothic One', cursive;
  font-size: clamp(.6rem,1.5vw,.75rem); letter-spacing:.1em;
  padding: 4px 12px; border:2px solid var(--black); box-shadow:3px 3px 0 var(--black);
  white-space: nowrap; flex-shrink:0;
}

/* overseas grid */
.overseas-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(260px, 100%), 1fr));
  gap: 1.2rem;
}

.ov-card {
  border: var(--border); box-shadow: var(--sh);
  background: var(--white); overflow:hidden;
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease;
}
.ov-card:hover { transform:translate(-3px,-3px); box-shadow: var(--sh-lg); }

.ov-card-img {
  width:100%; aspect-ratio:3/2;
  display:flex; align-items:center; justify-content:center;
  border-bottom:var(--border);
  font-family:'Dela Gothic One',cursive; font-size:clamp(.6rem,1.5vw,.75rem);
  letter-spacing:.1em; color:rgba(255,255,255,.28);
  position:relative; overflow:hidden;
}
.ov-card-img img {
  position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
}

.ov-card-body { padding: .85rem; }
.ov-country-tag {
  display:inline-flex; align-items:center; gap:4px;
  background:var(--cyan); border:2px solid var(--black); box-shadow:2px 2px 0 var(--black);
  padding:2px 8px; margin-bottom:.55rem;
  font-family:'Dela Gothic One',cursive; font-size:.6rem; letter-spacing:.1em;
}
.ov-card-title {
  font-family:'Dela Gothic One',cursive;
  font-size:clamp(.9rem,2.2vw,1.05rem); letter-spacing:.03em; margin-bottom:.4rem; line-height:1.3;
}
.ov-card-desc { font-size:.75rem; line-height:1.85; color:#555; margin-bottom:.6rem; }
.ov-chips { display:flex; flex-wrap:wrap; gap:.3rem; }
.ov-chip { background:var(--black); color:var(--yellow); font-family:'Dela Gothic One',cursive; font-size:.56rem; letter-spacing:.1em; padding:2px 7px; }

/* add card */
.ov-add-card {
  border: 3px dashed rgba(0,0,0,.25);
  aspect-ratio: unset;
  display: flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:.6rem;
  padding: 2.5rem 1rem;
  cursor: pointer; background: transparent;
  transition: background .15s, border-color .15s;
  min-height: 200px;
}
.ov-add-card:hover { background:var(--yellow); border-color:var(--black); border-style:solid; box-shadow:var(--sh); }
.ov-add-card .plus { font-family:'Bangers',cursive; font-size:3rem; color:rgba(0,0,0,.2); line-height:1; }
.ov-add-card span { font-family:'Dela Gothic One',cursive; font-size:.72rem; letter-spacing:.1em; color:rgba(0,0,0,.35); }

/* ─── MODAL ─── */
.modal-bg {
  position:fixed; inset:0; z-index:1000;
  background:rgba(0,0,0,.7);
  display:none; align-items:flex-end; justify-content:center;
}
.modal-bg.open { display:flex; }
.modal-sheet {
  background:var(--white); width:100%; max-width:520px;
  border-top:var(--border); border-left:var(--border); border-right:var(--border);
  max-height:88svh; overflow-y:auto;
  animation: sheetUp .32s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-bar { display:flex; justify-content:center; padding:.7rem 0 .3rem; }
.modal-bar-inner { width:38px; height:4px; background:#ccc; border-radius:2px; }
.modal-close-btn {
  width:100%; padding:12px; border:none; border-top:var(--border);
  background:var(--black); color:var(--white);
  font-family:'Dela Gothic One',cursive; font-size:.72rem; letter-spacing:.1em;
  cursor:pointer;
}

/* ─── FOOTER ─── */
footer {
  background:var(--lightblue); border-top:var(--border);
  padding:1.2rem clamp(1rem,3vw,2rem);
  display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:.8rem;
}
.footer-logo { font-family:'Bangers',cursive; font-size:1.6rem; letter-spacing:.1em; color:var(--black); text-decoration:none; }
.footer-copy { font-size:.6rem; font-weight:700; letter-spacing:.12em; color:rgba(0,0,0,.4); }

.slider-nav {
  display: flex; align-items: center; gap: .6rem;
  margin-bottom: .7rem;
}
.slider-btn {
  background: var(--white); color: var(--sakura);
  font-family: 'Dela Gothic One', cursive;
  font-size: .8rem; padding: 2px 5px;
  border: 2px solid var(--white);
  box-shadow: 2px 2px 0 var(--white);
  cursor: pointer;
}

/* ← ボタン：画像の中央下部より左 */
.img-prev {
  position: absolute;
  bottom: 10px;
  left: calc(50% - 40px);
  transform: translateX(-50%);
  background: transparent;
  border: none;
  box-shadow: none;
  color: var(--sakura);
  font-size: 1.2rem;
  cursor: pointer;
  padding: 0;
}

/* → ボタン：画像の中央下部より右 */
.img-next {
  position: absolute;
  bottom: 10px;
  left: calc(50% + 40px);
  transform: translateX(-50%);
  background: transparent;
  border: none;
  box-shadow: none;
  color: var(--sakura);
  font-size: 1.2rem;
  cursor: pointer;
  padding: 0;
}
.slider-count {
  font-family: 'Dela Gothic One', cursive;
  font-size: .65rem; letter-spacing: .1em;
  color: rgba(0,0,0,.45);
}
</style>
</head>

<div id="tip"></div>

<!-- ─── HEADER ─── -->
<header>
  <a class="logo" href="#"><span>SNAP</span><div class="logo-pip"></div><span>MAP</span></a>
  <div class="tab-nav">
    <button class="tab-btn active" data-tab="japan">🇯🇵日本</button>

// JAPAN INTERACTION
// ══════════════════
const tip = document.getElementById('tip');
let activeJP = null;

let activeIdx = 0;

function buildCardHTML(id, idx) {
  const photos = jpData[id];
  const prefInfo = ALL_PREFS.find(p => p.id === id) || {};
  const name = prefInfo.name || id;
  const region = prefInfo.region || '';

  if (!photos) {
    return `
      <div class="no-photo-placeholder">
        <span class="cam">📷</span>
        <span>まだ撮影していません</span>
      </div>
      <div class="card-body">
        <div class="card-location">📍 ${name}</div>
        <h2 class="card-title">${name} — 未撮影</h2>
        <p class="card-desc">写真はまだありません。</p>
      </div>`;
  }

  const d = photos[idx];
  const total = photos.length;

  // 県内カード切り替えボタン
  const nav = total > 1 ? `
    <div class="slider-nav">
      <button class="slider-btn" onclick="slidePhoto('${id}', ${idx - 1})">←</button>
      <span class="slider-count">${idx + 1} / ${total}</span>
      <button class="slider-btn" onclick="slidePhoto('${id}', ${idx + 1})">→</button>
    </div>` : '';

  // 1タイトル内の複数画像ボタン
  const imgs = d.imgs || [d.img];
  const totalImgs = imgs.length;
  const imgNav = totalImgs > 1 ? `
    <button class="slider-btn img-prev" onclick="slidePic(this, -1)">←</button>
    <button class="slider-btn img-next" onclick="slidePic(this, 1)">→</button>
    <span class="slide-count-badge">1 / ${totalImgs}</span>` : '';

  return `
    <div class="card-img-area" data-imgs='${JSON.stringify(imgs)}' data-pic-idx="0">
      <img src="${imgs[0]}" alt="${d.title}">
      ${imgNav}
    </div>
    <div class="card-body">
      <div class="card-location">📍 ${name} <span style="font-size:.55rem;opacity:.55;margin-left:4px">${region}</span></div>
      ${nav}
      <h2 class="card-title">${d.title}</h2>
      <p class="card-desc">${d.desc}</p>
      <div class="card-chips">${d.chips.map(c => `<span class="chip">${c}</span>`).join('')}</div>
    </div>`;
}

function slidePhoto(id, idx) {
  activeIdx = (idx + jpData[id].length) % jpData[id].length;
  renderCard(id);
}

function slidePic(btn, dir) {
  const area = btn.closest('.card-img-area');
  const imgs = JSON.parse(area.dataset.imgs);
  let idx = parseInt(area.dataset.picIdx) + dir;
  idx = (idx + imgs.length) % imgs.length;
  area.dataset.picIdx = idx;
  area.querySelector('img').src = imgs[idx];
  area.querySelector('.slide-count-badge').textContent = `${idx + 1} / ${imgs.length}`;
}

function renderCard(id) {
  const html = buildCardHTML(id, activeIdx);
  if (window.innerWidth < 900) {
    document.getElementById('modal-inner').innerHTML = html;
  } else {
    const card = document.getElementById('desktop-card');
    card.innerHTML = html;
    card.classList.add('show');
  }
}

function selectJP(id) {
  activeJP = id;
  activeIdx = 0;

  document.querySelectorAll('.pref-path').forEach(el => el.classList.remove('active'));
  const path = document.getElementById('p-' + id);
  if (path) path.classList.add('active');

  document.querySelectorAll('.pref-row').forEach(r => r.classList.remove('active'));
  const row = document.querySelector(`.pref-row[data-id="${id}"]`);
  if (row) { row.classList.add('active'); row.scrollIntoView({ block: 'nearest' }); }

  if (window.innerWidth < 900) {
    document.getElementById('modal-inner').innerHTML = buildCardHTML(id, 0);
    document.getElementById('modal-bg').classList.add('open');
    document.body.style.overflow = 'hidden';
  } else {
    document.getElementById('panel-idle').style.display = 'none';
    const card = document.getElementById('desktop-card');
    card.classList.remove('show'); void card.offsetWidth;
    card.innerHTML = buildCardHTML(id, 0);
    card.classList.add('show');
  }
}

// map events
document.querySelectorAll('.pref-path').forEach(path => {
  const id = (path.id||'').replace('p-','');
  const rawName = path.dataset.name;

  path.addEventListener('click', () => { if(id) selectJP(id); });

  path.addEventListener('mouseenter', e => {
    if(!rawName) return;
    const has = jpData[id];
    tip.textContent = rawName + (has ? ' 📸' : '');
    tip.style.display = 'block';
  });
  path.addEventListener('mousemove', e => {
    tip.style.left = (e.clientX+14)+'px';
    tip.style.top  = (e.clientY-36)+'px';
  });
  path.addEventListener('mouseleave', () => { tip.style.display='none'; });

  path.setAttribute('tabindex','0');
  path.setAttribute('role','button');
  path.addEventListener('keydown', e => {
    if(e.key==='Enter'||e.key===' ') { e.preventDefault(); if(id) selectJP(id); }
  });
});
